<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="container">

    <!-- LADO ESQUERDO -->
    <div class="left">
        <h1 class="h1-fist">Faça login</h1>
        <h1 class="h1-second">E entre para o nosso time</h1>
        <img class="rocket" src="Nave espacial futurista com detalhes neon.png" alt="Ilustração">
    </div>

    <!-- LADO DIREITO -->
    <div class="right">
        <div class="login-box">
            <h2>LOGIN</h2>

            <label>Usuário</label>
            <input type="text" id="usuario" placeholder="Usuário">

            <label>Senha</label>
            <div class="senha-box">
                <input type="password" id="senha" placeholder="Senha">
                <button type="button" id="mostrarSenha">👁️</button>
            </div>

            <a href="#">Recuperar senha?</a>

            <button id="btnLogin">LOGIN</button>

            <p id="mensagem"></p>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
